<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0f0f1a;
            font-family: 'Courier New', 'Consolas', monospace;
            user-select: none;
            overflow: hidden;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                linear-gradient(rgba(0, 255, 100, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 100, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: 0;
        }

        .game-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 500px;
        }

        .title {
            font-size: 2.2rem;
            font-weight: bold;
            color: #00ff64;
            text-shadow: 0 0 20px rgba(0, 255, 100, 0.4), 0 0 40px rgba(0, 255, 100, 0.15);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .score-panel {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .score-label {
            font-size: 0.7rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .score-value {
            font-size: 1.6rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .high-score .score-value {
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .canvas-container {
            position: relative;
            border: 2px solid rgba(0, 255, 100, 0.25);
            border-radius: 8px;
            box-shadow:
                0 0 30px rgba(0, 255, 100, 0.08),
                inset 0 0 30px rgba(0, 255, 100, 0.03);
            overflow: hidden;
            transition: border-color 0.3s ease;
        }

        .canvas-container.game-over {
            border-color: rgba(255, 50, 50, 0.5);
            box-shadow:
                0 0 40px rgba(255, 50, 50, 0.1),
                inset 0 0 30px rgba(255, 50, 50, 0.03);
        }

        canvas {
            display: block;
            background: #12121f;
        }

        .game-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        button {
            font-family: inherit;
            font-size: 0.85rem;
            padding: 10px 28px;
            border: 1px solid rgba(0, 255, 100, 0.3);
            background: rgba(0, 255, 100, 0.05);
            color: #00ff64;
            border-radius: 6px;
            cursor: pointer;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s ease;
            position: relative;
        }

        button:hover {
            background: rgba(0, 255, 100, 0.12);
            border-color: rgba(0, 255, 100, 0.5);
            box-shadow: 0 0 15px rgba(0, 255, 100, 0.1);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
            background: rgba(0, 255, 100, 0.18);
        }

        .difficulty-selector {
            display: flex;
            gap: 0;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .difficulty-btn {
            padding: 8px 16px;
            font-size: 0.75rem;
            border: none;
            border-radius: 0;
            background: rgba(255, 255, 255, 0.03);
            color: #666;
            cursor: pointer;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        .difficulty-btn.active {
            background: rgba(0, 255, 100, 0.1);
            color: #00ff64;
        }

        .difficulty-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.06);
            color: #aaa;
        }

        .instructions {
            color: #333;
            font-size: 0.7rem;
            text-align: center;
            letter-spacing: 1px;
            line-height: 1.6;
        }

        .instructions span {
            color: #00ff64;
            opacity: 0.7;
        }

        .mobile-controls {
            display: none;
            grid-template-areas:
                ". up ."
                "left . right"
                ". down .";
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 4px;
        }

        .mobile-btn {
            width: 60px;
            height: 60px;
            border: 1px solid rgba(0, 255, 100, 0.15);
            background: rgba(0, 255, 100, 0.04);
            color: rgba(0, 255, 100, 0.5);
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s ease;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .mobile-btn:active {
            background: rgba(0, 255, 100, 0.15);
            border-color: rgba(0, 255, 100, 0.4);
            color: #00ff64;
        }

        .mobile-btn.up    { grid-area: up; }
        .mobile-btn.down  { grid-area: down; }
        .mobile-btn.left  { grid-area: left; }
        .mobile-btn.right { grid-area: right; }

        @media (max-width: 600px), (hover: none) and (pointer: coarse) {
            .mobile-controls {
                display: grid;
            }
            .instructions {
                display: none;
            }
            .title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <!-- Header -->
        <div class="game-header">
            <h1 class="title">Snake</h1>
            <div class="score-panel">
                <div class="score-item">
                    <span class="score-label">Score</span>
                    <span class="score-value" id="score">0</span>
                </div>
                <div class="score-item high-score">
                    <span class="score-label">Best</span>
                    <span class="score-value" id="highScore">0</span>
                </div>
            </div>
        </div>

        <!-- Game Canvas -->
        <div class="canvas-container" id="canvasContainer">
            <canvas id="gameCanvas"></canvas>
        </div>

        <!-- Controls -->
        <div class="game-controls">
            <button id="restartBtn">⟳ New Game</button>
            <div class="difficulty-selector">
                <button class="difficulty-btn" data-speed="120">Slow</button>
                <button class="difficulty-btn active" data-speed="80">Medium</button>
                <button class="difficulty-btn" data-speed="45">Fast</button>
            </div>
        </div>

        <!-- Mobile D-Pad -->
        <div class="mobile-controls">
            <button class="mobile-btn up"    data-dir="up">▲</button>
            <button class="mobile-btn left"  data-dir="left">◄</button>
            <button class="mobile-btn right" data-dir="right">►</button>
            <button class="mobile-btn down"  data-dir="down">▼</button>
        </div>

        <!-- Instructions -->
        <p class="instructions">
            Use <span>Arrow Keys</span> or <span>WASD</span> to move &nbsp;|&nbsp; Press <span>Space</span> to pause
        </p>
    </div>

    <script>
        (function() {
            // ─── DOM Elements ────────────────────────────
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const canvasContainer = document.getElementById('canvasContainer');
            const scoreEl = document.getElementById('score');
            const highScoreEl = document.getElementById('highScore');
            const restartBtn = document.getElementById('restartBtn');
            const difficultyBtns = document.querySelectorAll('.difficulty-btn');
            const mobileBtns = document.querySelectorAll('.mobile-btn');

            // ─── Constants ──────────────────────────────
            const GRID_SIZE = 20;
            const COLS = 25;
            const ROWS = 25;

            // ─── Game State ─────────────────────────────
            let snake = [];
            let food = { x: 0, y: 0 };
            let direction = { x: 1, y: 0 };
            let nextDirection = { x: 1, y: 0 };
            let score = 0;
            let highScore = 0;
            let gameSpeed = 80; // ms per tick
            let gameLoop = null;
            let isRunning = false;
            let isPaused = false;
            let isGameOver = false;
            let particles = [];
            let trailPositions = [];

            // ─── Initialize ─────────────────────────────
            function initCanvas() {
                canvas.width = COLS * GRID_SIZE;
                canvas.height = ROWS * GRID_SIZE;
            }

            function loadHighScore() {
                try {
                    const saved = localStorage.getItem('snakeHighScore');
                    if (saved) highScore = parseInt(saved, 10) || 0;
                } catch (_) { /* localStorage not available */ }
                highScoreEl.textContent = highScore;
            }

            function saveHighScore() {
                if (score > highScore) {
                    highScore = score;
                    highScoreEl.textContent = highScore;
                    try {
                        localStorage.setItem('snakeHighScore', highScore.toString());
                    } catch (_) { /* localStorage not available */ }
                }
            }

            function spawnFood() {
                const openCells = [];
                for (let x = 0; x < COLS; x++) {
                    for (let y = 0; y < ROWS; y++) {
                        const occupied = snake.some(seg => seg.x === x && seg.y === y);
                        if (!occupied) openCells.push({ x, y });
                    }
                }
                if (openCells.length === 0) return; // win condition
                const cell = openCells[Math.floor(Math.random() * openCells.length)];
                food = cell;
            }

            function resetGame() {
                // Create initial snake in the middle
                const midX = Math.floor(COLS / 2);
                const midY = Math.floor(ROWS / 2);
                snake = [
                    { x: midX, y: midY },
                    { x: midX - 1, y: midY },
                    { x: midX - 2, y: midY },
                ];
                direction = { x: 1, y: 0 };
                nextDirection = { x: 1, y: 0 };
                score = 0;
                isGameOver = false;
                isPaused = false;
                particles = [];
                trailPositions = [];
                scoreEl.textContent = '0';
                canvasContainer.classList.remove('game-over');
                spawnFood();
            }

            // ─── Game Logic ─────────────────────────────
            function tick() {
                if (!isRunning || isPaused || isGameOver) return;

                // Apply queued direction
                direction = { ...nextDirection };

                // Store trail for rendering
                trailPositions.push({
                    x: snake[snake.length - 1].x,
                    y: snake[snake.length - 1].y,
                    life: 1.0
                });

                // Move head
                const head = {
                    x: snake[0].x + direction.x,
                    y: snake[0].y + direction.y
                };

                // Check wall collision
                if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
                    die();
                    return;
                }

                // Check self collision
                if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                    die();
                    return;
                }

                // Add new head
                snake.unshift(head);

                // Check food collision
                if (head.x === food.x && head.y === food.y) {
                    score += 10;
                    scoreEl.textContent = score;
                    spawnParticles(food.x, food.y);
                    spawnFood();
                } else {
                    // Remove tail
                    snake.pop();
                }

                // Update trail life
                trailPositions = trailPositions
                    .map(t => ({ ...t, life: t.life - 0.05 }))
                    .filter(t => t.life > 0);

                draw();
            }

            function die() {
                isGameOver = true;
                canvasContainer.classList.add('game-over');
                // Death particles from head
                const head = snake[0];
                for (let i = 0; i < 30; i++) {
                    particles.push({
                        x: (head.x + 0.5) * GRID_SIZE,
                        y: (head.y + 0.5) * GRID_SIZE,
                        vx: (Math.random() - 0.5) * 6,
                        vy: (Math.random() - 0.5) * 6,
                        life: 1.0,
                        color: Math.random() > 0.5 ? '#ff3232' : '#ff6464'
                    });
                }
                saveHighScore();
                draw();
            }

            function spawnParticles(gx, gy) {
                const cx = (gx + 0.5) * GRID_SIZE;
                const cy = (gy + 0.5) * GRID_SIZE;
                for (let i = 0; i < 12; i++) {
                    particles.push({
                        x: cx,
                        y: cy,
                        vx: (Math.random() - 0.5) * 4,
                        vy: (Math.random() - 0.5) * 4,
                        life: 1.0,
                        color: '#00ff64'
                    });
                }
            }

            // ─── Rendering ──────────────────────────────
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Draw subtle grid
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.02)';
                ctx.lineWidth = 0.5;
                for (let x = 0; x <= COLS; x++) {
                    ctx.beginPath();
                    ctx.moveTo(x * GRID_SIZE, 0);
                    ctx.lineTo(x * GRID_SIZE, canvas.height);
                    ctx.stroke();
                }
                for (let y = 0; y <= ROWS; y++) {
                    ctx.beginPath();
                    ctx.moveTo(0, y * GRID_SIZE);
                    ctx.lineTo(canvas.width, y * GRID_SIZE);
                    ctx.stroke();
                }

                // Draw trail
                for (const t of trailPositions) {
                    const alpha = t.life * 0.3;
                    const size = GRID_SIZE * (0.5 + t.life * 0.5);
                    ctx.fillStyle = `rgba(0, 255, 100, ${alpha})`;
                    ctx.beginPath();
                    ctx.roundRect(
                        t.x * GRID_SIZE + (GRID_SIZE - size) / 2,
                        t.y * GRID_SIZE + (GRID_SIZE - size) / 2,
                        size, size, 4
                    );
                    ctx.fill();
                }

                // Draw food
                const foodPulse = 1 + Math.sin(Date.now() / 200) * 0.2;
                const foodSize = GRID_SIZE * 0.7 * foodPulse;

                // Food glow
                const glowGrad = ctx.createRadialGradient(
                    (food.x + 0.5) * GRID_SIZE, (food.y + 0.5) * GRID_SIZE, 2,
                    (food.x + 0.5) * GRID_SIZE, (food.y + 0.5) * GRID_SIZE, GRID_SIZE * 1.2
                );
                glowGrad.addColorStop(0, 'rgba(255, 80, 80, 0.4)');
                glowGrad.addColorStop(1, 'rgba(255, 80, 80, 0)');
                ctx.fillStyle = glowGrad;
                ctx.beginPath();
                ctx.arc(
                    (food.x + 0.5) * GRID_SIZE, (food.y + 0.5) * GRID_SIZE,
                    GRID_SIZE * 1.2, 0, Math.PI * 2
                );
                ctx.fill();

                // Food body
                const foodGrad = ctx.createRadialGradient(
                    (food.x + 0.35) * GRID_SIZE, (food.y + 0.35) * GRID_SIZE, 1,
                    (food.x + 0.5) * GRID_SIZE, (food.y + 0.5) * GRID_SIZE, foodSize
                );
                foodGrad.addColorStop(0, '#ff9999');
                foodGrad.addColorStop(0.6, '#ff4444');
                foodGrad.addColorStop(1, '#cc2222');
                ctx.fillStyle = foodGrad;
                ctx.beginPath();
                ctx.arc(
                    (food.x + 0.5) * GRID_SIZE, (food.y + 0.5) * GRID_SIZE,
                    foodSize / 2, 0, Math.PI * 2
                );
                ctx.fill();

                // Draw snake
                for (let i = snake.length - 1; i >= 0; i--) {
                    const seg = snake[i];
                    const t = snake.length > 1 ? i / (snake.length - 1) : 0;
                    const segSize = GRID_SIZE - 2;

                    // Color gradient from head (bright) to tail (dimmer, more blue)
                    const r = Math.floor(0 + t * 20);
                    const g = Math.floor(255 - t * 40);
                    const b = Math.floor(100 + t * 60);
                    const alpha = isGameOver ? 0.3 : 1;

                    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
                    ctx.shadowColor = `rgba(0, 255, 100, ${0.3 * (1 - t * 0.5)})`;
                    ctx.shadowBlur = isGameOver ? 0 : 5;

                    ctx.beginPath();
                    ctx.roundRect(
                        seg.x * GRID_SIZE + 1,
                        seg.y * GRID_SIZE + 1,
                        segSize,
                        segSize,
                        i === 0 ? 6 : 4
                    );
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    // Head eyes
                    if (i === 0 && !isGameOver) {
                        ctx.fillStyle = '#fff';
                        const eyeSize = 3.5;
                        let ex1, ey1, ex2, ey2;
                        const cx = seg.x * GRID_SIZE + GRID_SIZE / 2;
                        const cy = seg.y * GRID_SIZE + GRID_SIZE / 2;

                        if (direction.x === 1) {
                            ex1 = cx + 3; ey1 = cy - 4;
                            ex2 = cx + 3; ey2 = cy + 4;
                        } else if (direction.x === -1) {
                            ex1 = cx - 3; ey1 = cy - 4;
                            ex2 = cx - 3; ey2 = cy + 4;
                        } else if (direction.y === -1) {
                            ex1 = cx - 4; ey1 = cy - 3;
                            ex2 = cx + 4; ey2 = cy - 3;
                        } else {
                            ex1 = cx - 4; ey1 = cy + 3;
                            ex2 = cx + 4; ey2 = cy + 3;
                        }

                        ctx.beginPath();
                        ctx.arc(ex1, ey1, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(ex2, ey2, eyeSize, 0, Math.PI * 2);
                        ctx.fill();

                        // Pupils
                        ctx.fillStyle = '#111';
                        ctx.beginPath();
                        ctx.arc(ex1, ey1, 1.8, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(ex2, ey2, 1.8, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    // Death X-eyes
                    if (i === 0 && isGameOver) {
                        ctx.fillStyle = '#ff3232';
                        const cx = seg.x * GRID_SIZE + GRID_SIZE / 2;
                        const cy = seg.y * GRID_SIZE + GRID_SIZE / 2;
                        ctx.strokeStyle = '#ff3232';
                        ctx.lineWidth = 2;
                        [
                            [cx - 5, cy - 4, cx - 1, cy],
                            [cx + 1, cy, cx + 5, cy - 4],
                            [cx - 5, cy + 4, cx - 1, cy],
                            [cx + 1, cy, cx + 5, cy + 4]
                        ].forEach(([x1, y1, x2, y2]) => {
                            ctx.beginPath();
                            ctx.moveTo(x1, y1);
                            ctx.lineTo(x2, y2);
                            ctx.stroke();
                        });
                        ctx.lineWidth = 1;
                    }
                }

                // Draw particles
                for (const p of particles) {
                    const hex = p.color;
                    const r2 = parseInt(hex.slice(1, 3), 16);
                    const g2 = parseInt(hex.slice(3, 5), 16);
                    const b2 = parseInt(hex.slice(5, 7), 16);
                    ctx.fillStyle = `rgba(${r2}, ${g2}, ${b2}, ${p.life})`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 2 + p.life * 2, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Update particles
                particles = particles
                    .map(p => ({
                        ...p,
                        x: p.x + p.vx,
                        y: p.y + p.vy,
                        life: p.life - 0.03,
                        vy: p.vy + 0.05
                    }))
                    .filter(p => p.life > 0);

                // Game over overlay
                if (isGameOver) {
                    // Darken
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    ctx.fillStyle = '#ff3232';
                    ctx.font = 'bold 36px "Courier New", monospace';
                    ctx.textAlign = 'center';
                    ctx.shadowColor = 'rgba(255, 50, 50, 0.5)';
                    ctx.shadowBlur = 20;
                    ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 10);
                    ctx.shadowBlur = 0;

                    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                    ctx.font = '14px "Courier New", monospace';
                    ctx.fillText('Press ENTER or click New Game', canvas.width / 2, canvas.height / 2 + 30);
                    ctx.textAlign = 'start';
                }

                // Pause overlay
                if (isPaused && !isGameOver) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    ctx.fillStyle = '#00ff64';
                    ctx.font = 'bold 30px "Courier New", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
                    ctx.textAlign = 'start';
                }
            }

            // ─── Game Loop ──────────────────────────────
            function startGameLoop() {
                stopGameLoop();
                let lastTick = 0;
                let accumulator = 0;
                const MAX_ACCUMULATOR = gameSpeed * 5;

                function loop(timestamp) {
                    if (!isRunning) return;

                    if (!isGameOver && !isPaused) {
                        accumulator += timestamp - lastTick;
                        lastTick = timestamp;

                        // Clamp accumulator to prevent spiral-of-death when tab is backgrounded
                        if (accumulator > MAX_ACCUMULATOR) {
                            accumulator = MAX_ACCUMULATOR;
                        }

                        while (accumulator >= gameSpeed) {
                            tick();
                            accumulator -= gameSpeed;
                            if (isGameOver) break;
                        }
                    }

                    // Always draw every frame for smooth particle / pulse animations
                    draw();
                    gameLoop = requestAnimationFrame(loop);
                }

                lastTick = performance.now();
                gameLoop = requestAnimationFrame(loop);
            }

            function stopGameLoop() {
                if (gameLoop) {
                    cancelAnimationFrame(gameLoop);
                    gameLoop = null;
                }
            }

            function startGame() {
                isRunning = true;
                draw();
                startGameLoop();
            }

            // ─── Input Handling ─────────────────────────
            function changeDirection(dx, dy) {
                if (isGameOver || isPaused) return;

                // Prevent reversing into self
                if (dx === -direction.x && dy === -direction.y) return;
                // Also prevent setting same direction twice rapidly
                if (dx === 0 && dy === 0) return;

                nextDirection = { x: dx, y: dy };
            }

            function handleKeyDown(e) {
                const key = e.key.toLowerCase();

                switch (key) {
                    case 'arrowup':
                    case 'w':
                        e.preventDefault();
                        changeDirection(0, -1);
                        break;
                    case 'arrowdown':
                    case 's':
                        e.preventDefault();
                        changeDirection(0, 1);
                        break;
                    case 'arrowleft':
                    case 'a':
                        e.preventDefault();
                        changeDirection(-1, 0);
                        break;
                    case 'arrowright':
                    case 'd':
                        e.preventDefault();
                        changeDirection(1, 0);
                        break;
                    case ' ':
                        e.preventDefault();
                        if (!isGameOver) togglePause();
                        break;
                    case 'enter':
                        e.preventDefault();
                        if (isGameOver) restart();
                        break;
                }
            }

            function togglePause() {
                if (isGameOver) return;
                isPaused = !isPaused;
                draw();
            }

            function restart() {
                stopGameLoop();
                resetGame();
                startGame();
            }

            // ─── Event Listeners ────────────────────────
            document.addEventListener('keydown', handleKeyDown);

            restartBtn.addEventListener('click', () => restart());

            difficultyBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    difficultyBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    gameSpeed = parseInt(btn.dataset.speed, 10);
                });
            });

            mobileBtns.forEach(btn => {
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const dir = btn.dataset.dir;
                    switch (dir) {
                        case 'up': changeDirection(0, -1); break;
                        case 'down': changeDirection(0, 1); break;
                        case 'left': changeDirection(-1, 0); break;
                        case 'right': changeDirection(1, 0); break;
                    }
                });
                btn.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    const dir = btn.dataset.dir;
                    switch (dir) {
                        case 'up': changeDirection(0, -1); break;
                        case 'down': changeDirection(0, 1); break;
                        case 'left': changeDirection(-1, 0); break;
                        case 'right': changeDirection(1, 0); break;
                    }
                });
            });

            // Prevent scrolling on mobile when touching canvas
            canvas.addEventListener('touchmove', e => e.preventDefault());

            // ─── Boot ────────────────────────────────────
            initCanvas();
            loadHighScore();
            resetGame();
            startGame();
        })();
    </script>
</body>
</html>
